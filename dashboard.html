<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style/styles.css">

</head>

<body>
    <header class="bg-base-100 shadow-sm sticky top-0 z-50">
        <div class="navbar container mx-auto px-4">

            <div class="navbar-start w-auto">
                <a href="dashboard.html" class="flex items-center gap-3 hover:bg-gray-50 p-2 rounded-lg transition-all">
                    <div class="flex items-center justify-center">
                        <img class="h-8 w-8 object-contain" src="assets/github-logo.png" alt="logo">
                    </div>
                    <span
                        class="text-lg sm:text-xl md:text-2xl font-bold md:font-semibold tracking-tight text-gray-800">
                        GitHub Issues Tracker
                    </span>
                </a>
            </div>


            <div class="navbar-end flex-grow justify-end gap-4">
                <div class="hidden lg:flex items-center gap-3">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-2 pl-3 flex items-center pointer-events-none z-10">
                            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                        </div>
                    </div>

                    <input type="text" id="search-input" placeholder="Search issues..."
                        class="search-field input input-bordered w-32 md:w-64 h-10 pl-10 focus:outline-none focus:border-[#4f11ff] bg-gray-50 text-sm" />
                </div>

                <button
                    class="hidden lg:inline-flex btn btn-primary bg-[#4f11ff] hover:bg-[#3f0edb] border-none normal-case h-10 min-h-0 px-4 rounded-md shadow-md shadow-indigo-100">
                    <i class="fa-solid fa-plus text-sm"></i>
                    <span class="ml-2">New Issue</span>
                </button>
                <button onclick="handleLogout()"
                    class="hidden lg:inline-flex btn btn-ghost bg-red-200/30 text-red-500 hover:bg-red-400/30 border-none normal-case h-10 min-h-0 px-4 rounded-md">
                    <i class="fa-solid fa-right-from-bracket"></i>Logout
                </button>
            </div>

            <div class="dropdown dropdown-end lg:hidden">
                <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
                    <i class="fa-solid fa-bars text-xl"></i>
                </div>
                <ul tabindex="0"
                    class="menu menu-sm dropdown-content mt-3 z-[1] p-4 shadow-xl bg-base-100 rounded-box w-72 border border-gray-100 space-y-3">
                    <li class="mb-4">
                        <div class="relative w-full p-0">
                            <i class="fa-solid fa-magnifying-glass absolute left-3 text-gray-400"></i>
                            <input type="text" id="mobile-search-input" placeholder="Search Issues..."
                                class="search-field input input-bordered w-full h-11 pl-10 bg-gray-50 focus:outline-none" />
                        </div>
                    </li>
                    <li>
                        <button class="btn bg-[#4f11ff] hover:bg-[#3f0edb] text-white border-none w-full h-11">
                            <i class="fa-solid fa-plus"></i> New Issue
                        </button>
                    </li>
                    <li>
                        <button onclick="handleLogout()"
                            class="btn btn-ghost bg-red-200/30 text-red-500 hover:bg-red-400/30 border-none normal-case h-10 min-h-0 px-4 rounded-md">
                            <i class="fa-solid fa-right-from-bracket"></i> Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-10 px-4">

        <div class="issue-tracker-btn mb-8">
            <div
                class="flex flex-wrap gap-3 sm:gap-4 items-center bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-100">

                <button id="btn-all" onclick="filterIssues('all')"
                    class="btn flex-1 sm:flex-none bg-[#4f11ff] hover:bg-[#3f0edb] text-white border-none px-6 sm:px-8 rounded-lg font-bold min-h-0 h-11 text-sm sm:text-base">
                    All
                </button>

                <button id="btn-open" onclick="filterIssues('open')"
                    class="btn flex-1 sm:flex-none bg-white hover:bg-gray-50 text-gray-500 border border-gray-200 px-6 sm:px-8 rounded-lg font-medium min-h-0 h-11 shadow-none text-sm sm:text-base">
                    Open
                </button>

                <button id="btn-closed" onclick="filterIssues('closed')"
                    class="btn flex-1 sm:flex-none bg-white hover:bg-gray-50 text-gray-500 border border-gray-200 px-6 sm:px-8 rounded-lg font-medium min-h-0 h-11 shadow-none text-sm sm:text-base">
                    Closed
                </button>

            </div>
        </div>

        <div class="allIssues">
            <div
                class="flex flex-wrap gap-3 sm:gap-4 justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 flex items-center justify-center rounded-full bg-[#ECE4FF]">
                        <img src="assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 id="total-issues" class="text-2xl font-bold text-gray-800">0 Issues</h2>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-6 font-medium">
                    <div class="flex items-center gap-2">
                        <span class="w-4 h-4"><img src="assets/Open-Status.png" alt=""></span> Open
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-4 h-4"><img src="assets/Closed-Status .png" alt="Closed"></span> Closed
                    </div>
                </div>
            </div>
            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
        </div>

        <section>
            <dialog id="issueDetailsModal" class="modal modal-bottom sm:modal-middle">
                <div id="issueDetailsModalContainer" class="modal-box max-w-xl p-0 overflow-hidden">
                </div>
            </dialog>
        </section>
    </main>

    <script src="script/dashboard.js"></script>
</body>

</html>
