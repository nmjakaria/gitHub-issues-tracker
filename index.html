<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style/styles.css">
</head>

<body>

    <div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
        <div class="card w-full max-w-lg bg-white shadow-xl border border-gray-100 rounded-2xl p-8 md:p-12">

            <div class="text-center mb-10">
                <div class="flex justify-center mb-4">
                    <img src="assets/github-logo.png" alt="">
                </div>
                <h1 class="text-4xl font-bold text-gray-800 tracking-tight">GitHub Issues Tracker</h1>
                <p class="text-lg text-gray-500 mt-2">Sign in to manage your issues</p>
            </div>

            <form class="space-y-6">
                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text text-xl font-semibold text-gray-700">Username</span>
                    </label>
                    <input type="text" placeholder="Enter Username"
                        class="input input-bordered w-full h-14 text-lg focus:outline-blue-500 bg-gray-50" />
                    <label class="label">
                        <span class="label-text-alt text-blue-600 text-sm font-medium">Default: admin</span>
                    </label>
                </div>

                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text text-xl font-semibold text-gray-700">Password</span>
                    </label>
                    <input type="password" placeholder="Enter Password"
                        class="input input-bordered w-full h-14 text-lg focus:outline-blue-500 bg-gray-50" />
                    <label class="label">
                        <span class="label-text-alt text-blue-600 text-sm font-medium">Default: admin123</span>
                    </label>
                </div>

                <button
                    class="btn btn-primary w-full h-14 text-xl font-bold bg-[#4f11ff] hover:bg-[#3f0edb] border-none normal-case rounded-xl shadow-lg shadow-indigo-200">
                    Sign In
                </button>
            </form>

            <div class="divider my-10 text-gray-400 font-semibold">OR</div>

            <div class="bg-gray-50 rounded-2xl p-6 text-center border border-gray-100">
                <p class="text-gray-500 mb-3 font-medium">Demo Credentials:</p>
                <div class="text-lg text-gray-800">
                    <p><strong>Username:</strong> admin</p>
                    <p><strong>Password:</strong> admin123</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script/login.js"></script>
</body>

</html>
